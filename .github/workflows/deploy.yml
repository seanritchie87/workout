name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          sed -i "s|SCRIPT_URL_PLACEHOLDER|${{ secrets.SHEETS_URL }}|g" sean-workout-plan.html
          sed -i "s|AUTH_TOKEN_PLACEHOLDER|${{ secrets.AUTH_TOKEN }}|g" sean-workout-plan.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
